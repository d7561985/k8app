{{- if .Values.worker.enabled -}}
  {{- $root := . -}}
  {{- $appname := printf "%s" (include "name" .) -}}
  {{- range $workerName, $workerConfig := .Values.worker.spec }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ $root.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: {{ $appname }}
    appver: {{ include "k8app.labelVersion" $root | quote }}
    type: worker
    chart: "{{$root.Chart.Name}}-{{$root.Chart.Version}}"
    release: "{{ $root.Release.Name }}"
  name: {{ $appname }}-{{ $workerName }}
spec:
  replicas: {{ default 3 $workerConfig.replicas }}
  selector:
    matchLabels:
      app: {{ $appname }}-{{ $workerName }}
      type: worker
      worker-name: {{ $appname }}-{{ $workerName }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
    {{- if $root.Values.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $root.Values.prometheus.port | quote | default "8011" }}
    {{- end }}
      labels:
        app: {{ $appname }}-{{ $workerName }}
        type: worker
        worker-name: {{ $appname }}-{{ $workerName }}
    spec:
    {{- if $root.Values.serviceAccountName }}
      serviceAccountName: {{ $root.Values.serviceAccountName}}
    {{- else if $root.Values.rbac.create }}
      serviceAccountName: {{ $root.Release.Namespace }}-{{ $appname }}
    {{- end }}
      volumes:
        {{- if $root.Values.volume.enabled }}
        - name: {{template "persistantClaim" $root }}
          persistentVolumeClaim:
            claimName: {{template "persistantClaim" $root }}
        {{- end -}}
        {{- /* CSI volume only for AWS provider or legacy mode (not for Vault) */ -}}
        {{- include "k8app.secretVolumes" (dict "root" $root "appname" $appname) | nindent 8 }}
        {{- if $root.Values.configfiles }}
        - name: {{ printf "%s-config" $appname  }}
          configMap:
            name: {{ printf "%s-config" $appname }}
            {{- if $root.Values.configfiles.files }}
            items:
              {{- range $root.Values.configfiles.files }}
              - key: {{ .key }}
                path: {{ .path }}
              {{- end }}
            {{- end }}
        {{- end }}
        {{- /* Shared volumes for main container, initContainers, and extensions */ -}}
        {{- range $name, $spec := $root.Values.sharedVolumes }}
        - name: {{ $name }}
          {{- if eq $spec.type "emptyDir" }}
          emptyDir:
            {{- with $spec.medium }}
            medium: {{ . }}
            {{- end }}
            {{- with $spec.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- else if eq $spec.type "configMap" }}
          configMap:
            name: {{ $spec.name | default (printf "%s-%s" $appname $name) }}
          {{- else if eq $spec.type "secret" }}
          secret:
            secretName: {{ $spec.name | default (printf "%s-%s" $appname $name) }}
          {{- end }}
        {{- end }}
      containers:
      - env:
        - name: BUILD_ID
          value: {{ $root.Values.buildId | default "NULL" | quote }}
    {{- if $root.Values.cache.enabled }}
        - name: REDIS_URL
          value: "redis://{{ $appname }}-cache-sv:{{ $root.Values.cache.port }}"
    {{- end }}
    {{- if or $root.Values.secrets $root.Values.configmap }}
        {{- include "k8app.envFrom" (dict "root" $root "appname" $appname) | nindent 8 }}
    {{- end }}
        volumeMounts:
          {{- if $root.Values.volume.enabled }}
          - name: {{template "persistantClaim" $root }}
            mountPath: {{ $root.Values.volume.mount.path }}
          {{- end -}}
          {{- /* CSI volume mount only for AWS provider or legacy mode */ -}}
          {{- include "k8app.secretVolumeMounts" (dict "root" $root) | nindent 10 }}
          {{- if $root.Values.configfiles }}
          {{- if $root.Values.configfiles.files }}
          {{- range $root.Values.configfiles.files }}
          - name: {{ printf "%s-config" $appname }}
            readOnly: true
            mountPath: {{ .mountPath | default (printf "%s/%s" $root.Values.configfiles.mountPath .path) }}
            subPath: {{ .path }}
          {{- end }}
          {{- else }}
          - name: {{ printf "%s-config" $appname }}
            readOnly: true
            mountPath: {{ $root.Values.configfiles.mountPath }}
          {{- end }}
          {{- end }}
          {{- /* Shared volumes mounts */ -}}
          {{- range $name, $spec := $root.Values.sharedVolumes }}
          {{- if $spec.mountPath }}
          - name: {{ $name }}
            mountPath: {{ $spec.mountPath }}
            {{- if $spec.readOnly }}
            readOnly: {{ $spec.readOnly }}
            {{- end }}
          {{- end }}
          {{- end }}
        {{- $workerImage := $workerConfig.image | default dict }}
        image: {{ $workerImage.repository | default $root.Values.image.repository }}:{{ $workerImage.tag | default $root.Values.image.tag }}
        imagePullPolicy: {{ $workerImage.pullPolicy | default "Always" }}
        name: {{ $appname }}-{{ $workerName }}
        resources:
{{ default $root.Values.resources $workerConfig.resources | toYaml | indent 10 }}
    {{- if $workerConfig.livenessProbe }}
    {{- with $workerConfig.livenessProbe }}
        livenessProbe:
          failureThreshold: {{ .failureThreshold | default 3 }}
      {{- if eq .mode "httpGet" }}
      {{- with .httpGet }}
          httpGet:
            path: {{ .path  }}
            port: {{ .port | default 80 }}
            scheme: HTTP
      {{- end }}
      {{- end }}
      {{- if eq .mode "tcpSocket" }}
      {{- with .tcpSocket}}
          tcpSocket:
            port: {{ .tcpSocket.port | default 80 }}
      {{- end }}
      {{- end }}
      {{- if eq .mode "execCommand" }}
          exec:
            command:
              {{- range .execCommand.command}}
            - {{ . }}
              {{- end }}
      {{- end }}
          initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
          periodSeconds: {{ .periodSeconds | default 5 }}
          successThreshold: {{ .successThreshold | default 1 }}
          timeoutSeconds: {{ .timeoutSeconds | default 5 }}
    {{- end }}
    {{- end }}
    {{- if $workerConfig.readinessProbe }}
    {{- with $workerConfig.readinessProbe }}
        readinessProbe:
          failureThreshold: {{ .failureThreshold | default 3 }}
    {{- if eq .mode "httpGet" }}
    {{- with .httpGet }}
          httpGet:
            path: {{ .path  }}
            port: {{ .port | default 80 }}
            scheme: HTTP
    {{- end }}
    {{- end }}
    {{- if eq .mode "tcpSocket" }}
    {{- with .tcpSocket }}
          tcpSocket:
            port: {{ .port }}
    {{- end }}
    {{- end }}
    {{- if eq .mode "execCommand" }}
          exec:
            command:
              {{- range .execCommand.command}}
            - {{ . }}
              {{- end }}
    {{- end }}
          initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
          periodSeconds: {{ .periodSeconds | default 5 }}
          successThreshold: {{ .successThreshold | default 1 }}
          timeoutSeconds: {{ .timeoutSeconds | default 5 }}
    {{- end }}
    {{- end }}
        command:
        {{- range $workerConfig.command }}
        - {{ . | quote }}
        {{- end }}
        args:
        {{- range $workerConfig.args }}
        - {{ . | quote }}
        {{- end }}
    {{- range $name, $spec := $root.Values.extensions }}
      {{- $extensionName := printf "%s-%s" $appname $name }}
      - name: {{ $extensionName }}
        image: "{{ $spec.image.repository | default "" }}{{- if and $spec.image.repository $spec.image.name -}}/{{- end -}}{{ $spec.image.name | default "" }}:{{ $spec.image.tag | default "" }}"
        {{- if $spec.command }}
        command:
          {{- toYaml $spec.command | nindent 10 }}
        {{- end }}
        {{- if $spec.args }}
        args:
          {{- toYaml $spec.args | nindent 10 }}
        {{- end }}
        {{- if $spec.resources }}
        resources:
          {{- toYaml $spec.resources | nindent 10 }}
        {{- end }}
    {{- end }}
    {{- if $root.Values.nodeSelector }}
      nodeSelector:
{{ toYaml $root.Values.nodeSelector | indent 8 }}
    {{- end }}
    {{- with $root.Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- /* Image Pull Secrets - New universal approach */ -}}
      {{- include "k8app.imagePullSecrets" (dict "root" $root) | nindent 6 }}
      restartPolicy: Always
  {{- end -}}
{{- end -}}