{{- if .Values.job.enabled -}}
  {{- $appname := printf "%s" (include "name" .) -}}
  {{- $jobName :=  printf "%s-%s" (include "name" .) "job" -}}
  {{- range $key, $value := .Values.job.spec }}
---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: "{{ $.Release.Namespace }}"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    helm.sh/chart: "{{$.Chart.Name}}-{{$.Chart.Version}}"
    job: "{{ $jobName }}"
    chart: "{{ $.Chart.Name }}-{{ $.Chart.Version }}"
    release: "{{ $.Release.Name }}"
  name: "{{ $jobName }}-{{ $key }}"
spec:
  backoffLimit: {{ default 10 $value.backoffLimit }}
  completions: 1
  parallelism: 1
  template:
    metadata:
      name: "{{ $jobName }}-{{ $key }}"
      labels:
        helm.sh/chart: "{{$.Chart.Name}}-{{$.Chart.Version}}"
        job: "{{ $jobName }}"
    spec:
    {{- if $.Values.serviceAccountName }}
      serviceAccountName: {{ $.Values.serviceAccountName}}
    {{- else if $.Values.rbac.create }}
      serviceAccountName: {{ $.Release.Namespace }}-{{ $appname }}
    {{- end }}
    {{- /* CSI volume only for AWS provider or legacy mode (not for Vault) */ -}}
    {{- if and $.Values.secrets (or (not $.Values.secretsProvider) (ne $.Values.secretsProvider.provider "vault")) }}
      volumes:
        {{- include "k8app.secretVolumes" (dict "root" $ "appname" $appname) | nindent 8 }}
    {{- end }}
    {{- if $.Values.configfiles }}
      volumes:
        - name: {{ printf "%s-config" $appname  }}
          configMap:
            name: {{ printf "%s-config" $appname }}
            {{- if $.Values.configfiles.files }}
            items:
              {{- range $.Values.configfiles.files }}
              - key: {{ .key }}
                path: {{ .path }}
              {{- end }}
            {{- end }}
    {{- end }}
      containers:
      - name: "{{ $key }}"
        command:
        {{- range $value.command }}
        - {{ . | quote }}
        {{- end }}
        args:
        {{- range $value.args }}
        - {{ . | quote }}
        {{- end }}
        {{- include "k8app.envFrom" (dict "root" $ "appname" $appname) | nindent 8 }}
        env:
        - name: BUILD_ID
          value: {{ default "000" $.Values.image.tag | quote  }}
    {{- /* CSI volume mount only for AWS provider or legacy mode */ -}}
    {{- if and $.Values.secrets (or (not $.Values.secretsProvider) (ne $.Values.secretsProvider.provider "vault")) }}
        volumeMounts:
          {{- include "k8app.secretVolumeMounts" (dict "root" $) | nindent 10 }}
    {{- end }}
    {{- if $.Values.configfiles }}
        volumeMounts:
          {{- if $.Values.configfiles.files }}
          {{- range $.Values.configfiles.files }}
          - name: {{ printf "%s-config" $appname }}
            readOnly: true
            mountPath: {{ .mountPath | default (printf "%s/%s" $.Values.configfiles.mountPath .path) }}
            subPath: {{ .path }}
          {{- end }}
          {{- else }}
          - name: {{ printf "%s-config" $appname }}
            readOnly: true
            mountPath: {{ $.Values.configfiles.mountPath }}
          {{- end }}
    {{- end }}
        image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
        imagePullPolicy: Always
    {{- if $value.resources }}
        resources:
          {{- toYaml $value.resources | nindent 10 }}
    {{- end }}
    {{- if $.Values.nodeSelector }}
      nodeSelector:
{{ toYaml $.Values.nodeSelector | indent 8 }}
    {{- end }}
    {{- if $.Values.tolerations }}
      tolerations:
{{ toYaml $.Values.tolerations | indent 8 }}
    {{- end }}
      {{- include "k8app.imagePullSecrets" (dict "root" $) | nindent 6 }}
      restartPolicy: OnFailure
  {{- end -}}
{{- end -}}
