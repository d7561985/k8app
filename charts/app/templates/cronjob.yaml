{{- if .Values.cronjob.enabled -}}
  {{- $root := . -}}
  {{- $appname := printf "%s" (include "name" .) -}}
  {{- $cronJobName :=  printf "%s-%s" (include "name" .) "cron" -}}
  {{- range $key, $value := .Values.cronjob.spec }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  namespace: "{{ $root.Release.Namespace }}"
  labels:
    helm.sh/chart: "{{ $root.Chart.Name }}-{{ $root.Chart.Version }}"
    cronjob: "{{ $cronJobName }}"
    chart: "{{ $root.Chart.Name }}-{{ $root.Chart.Version }}"
    release: "{{ $root.Release.Name }}"
  name: "{{ $cronJobName }}-{{ $key }}"
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 10
  jobTemplate:
    metadata:
      name: "{{ $cronJobName }}-{{ $key }}"
      labels:
        helm.sh/chart: "{{$root.Chart.Name}}-{{$root.Chart.Version}}"
        cronjob: "{{ $cronJobName }}"
    spec:
      template:
        spec:
        {{- if $.Values.serviceAccountName }}
          serviceAccountName: {{ $.Values.serviceAccountName}}
        {{- else if $.Values.rbac.create }}
          serviceAccountName: {{ $.Release.Namespace }}-{{ $appname }}
        {{- end }}
        {{- /* CSI volume only for AWS provider or legacy mode (not for Vault) */ -}}
        {{- if and $root.Values.secrets (or (not $root.Values.secretsProvider) (ne $root.Values.secretsProvider.provider "vault")) }}
          volumes:
            {{- include "k8app.secretVolumes" (dict "root" $root "appname" $appname) | nindent 12 }}
        {{- end }}
        {{- if $root.Values.configfiles }}
          volumes:
            - name: {{ printf "%s-config" $appname  }}
              configMap:
                name: {{ printf "%s-config" $appname }}
                {{- if $root.Values.configfiles.files }}
                items:
                  {{- range $root.Values.configfiles.files }}
                  - key: {{ .key }}
                    path: {{ .path }}
                  {{- end }}
                {{- end }}
        {{- end }}
          containers:
          - name: "{{ $key }}"
            command:
            {{- range $value.command}}
            - {{ . | quote }}
            {{- end }}
            args:
            {{- range $value.args}}
            - {{ . | quote }}
            {{- end }}
            {{- include "k8app.envFrom" (dict "root" $root "appname" $appname) | nindent 12 }}
            env:
            - name: BUILD_ID
              value: {{ $root.Values.buildId | default "000" | quote }}
            - name: SENTRY_ENVIRONMENT
              value: {{ $root.Values.environment | quote }}
            - name: SENTRY_RELEASE
              value: {{ $root.Values.image.tag | quote }}
            {{- if $root.Values.jaegerEnabled }}
            - name: JAEGER_AGENT_BINARY_PORT
              value: "6832"
            - name: JAEGER_AGENT_COMPACT_PORT
              value: "6831"
            - name: JAEGER_AGENT_SAMPLING_PORT
              value: "5778"
            - name: JAEGER_AGENT_ZIPKIN_THRIFT_PORT
              value: "5775"
            - name: JAEGER_AGENT_HOST
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            {{- end }}
        {{- /* CSI volume mount only for AWS provider or legacy mode */ -}}
        {{- if and $root.Values.secrets (or (not $root.Values.secretsProvider) (ne $root.Values.secretsProvider.provider "vault")) }}
            volumeMounts:
              {{- include "k8app.secretVolumeMounts" (dict "root" $root) | nindent 14 }}
        {{- end }}
        {{- if $root.Values.configfiles }}
            volumeMounts:
              {{- if $root.Values.configfiles.files }}
              {{- range $root.Values.configfiles.files }}
              - name: {{ printf "%s-config" $appname }}
                readOnly: true
                mountPath: {{ .mountPath | default (printf "%s/%s" $root.Values.configfiles.mountPath .path) }}
                subPath: {{ .path }}
              {{- end }}
              {{- else }}
              - name: {{ printf "%s-config" $appname }}
                readOnly: true
                mountPath: {{ $root.Values.configfiles.mountPath }}
              {{- end }}
        {{- end }}
            image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
            imagePullPolicy: Always
        {{- if $value.resources }}
            resources:
              {{- toYaml $value.resources | nindent 14 }}
        {{- end }}
        {{- if $root.Values.nodeSelector }}
          nodeSelector:
          {{ toYaml $root.Values.nodeSelector | indent 8 }}
        {{- end }}
          {{- include "k8app.imagePullSecrets" (dict "root" $root) | nindent 10 }}
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
  schedule: {{ default "1 * * * *" $value.schedule | quote }}
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  suspend: false
  {{- end -}}
{{- end -}}
