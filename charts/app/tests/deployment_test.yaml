suite: Deployment
templates:
  - deployment.yaml
values:
  - ../values.yaml

tests:
  - it: should create a Deployment by default
    set:
      appName: myapp
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: myapp

  - it: should not render when deployment.enabled is false
    set:
      deployment:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use replicas from values
    set:
      appName: myapp
      replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5

  - it: should omit replicas when HPA is enabled
    set:
      appName: myapp
      hpa:
        enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: should set namespace from release
    release:
      namespace: yard-dev
    asserts:
      - equal:
          path: metadata.namespace
          value: yard-dev

  - it: should configure rolling update strategy
    set:
      appName: myapp
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 2
          maxUnavailable: 1
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 2
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 1

  - it: should add prometheus annotations when enabled
    set:
      appName: myapp
      prometheus:
        enabled: true
        port: "9090"
        path: "/metrics"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9090"

  - it: should set tolerations
    set:
      appName: myapp
      tolerations:
        - key: dedicated
          operator: Equal
          value: app
          effect: NoSchedule
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated

  # NOTE: nodeSelector is NOT in deployment.yaml template (only worker/cronjob/job)
  # This is a known gap — deployment uses only tolerations + affinity

  - it: should configure liveness probe (httpGet)
    set:
      appName: myapp
      livenessProbe:
        enabled: true
        mode: httpGet
        httpGet:
          port: 8080
          path: /health
        initialDelaySeconds: 10
        periodSeconds: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080

  - it: should configure readiness probe (tcpSocket)
    set:
      appName: myapp
      readinessProbe:
        enabled: true
        mode: tcpSocket
        tcpSocket:
          port: 9091
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 9091

  - it: should set resources
    set:
      appName: myapp
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  - it: should configure image pull secrets
    set:
      appName: myapp
      imagePullSecrets:
        - name: regsecret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: regsecret

  - it: should add configmap checksum annotation
    set:
      appName: myapp
      configmap:
        FOO: bar
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/conf"]

  - it: should add secrets checksum annotation
    set:
      appName: myapp
      secrets:
        DB_PASS: brand/myapp/dev/config
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/secrets"]
