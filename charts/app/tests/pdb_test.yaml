suite: PodDisruptionBudget
templates:
  - pdb.yaml
values:
  - ../values.yaml

tests:
  - it: should not render when pdb is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB with correct apiVersion
    set:
      appName: myapp
      pdb:
        enabled: true
        maxUnavailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: apiVersion
          value: policy/v1

  - it: should set maxUnavailable
    set:
      appName: myapp
      pdb:
        enabled: true
        maxUnavailable: 2
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 2

  - it: should set name from appName
    set:
      appName: myapp
      pdb:
        enabled: true
        maxUnavailable: 1
    asserts:
      - equal:
          path: metadata.name
          value: myapp
      - equal:
          path: metadata.labels.app
          value: myapp
