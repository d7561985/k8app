suite: HTTPRoute (Gateway API)
templates:
  - httproute.yaml
values:
  - ../values.yaml

tests:
  - it: should not render when gateway is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should create HTTPRoute with simple config
    set:
      appName: myapp
      service:
        enabled: true
        ports:
          http:
            externalPort: 8080
      gateway:
        enabled: true
        path: /api
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: myapp
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: myapp-sv
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: should support multiple parentRefs
    set:
      appName: myapp
      gateway:
        enabled: true
        parentRefs:
          - name: gateway
          - name: gateway-backoffice
    asserts:
      - lengthEqual:
          path: spec.parentRefs
          count: 2
      - equal:
          path: spec.parentRefs[0].name
          value: gateway
      - equal:
          path: spec.parentRefs[1].name
          value: gateway-backoffice

  - it: should support custom rules with filters (URLRewrite)
    set:
      appName: file-storage
      service:
        enabled: true
        ports:
          http:
            externalPort: 80
      gateway:
        enabled: true
        parentRefs:
          - name: gateway
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /fs
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /fs
      - equal:
          path: spec.rules[0].filters[0].type
          value: URLRewrite

  - it: should support hostnames
    set:
      appName: myapp
      gateway:
        enabled: true
        hostname: site.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: site.example.com

  - it: should default parentRef sectionName to http-app
    set:
      appName: myapp
      gateway:
        enabled: true
    asserts:
      - equal:
          path: spec.parentRefs[0].sectionName
          value: http-app
