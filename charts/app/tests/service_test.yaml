suite: Service
templates:
  - service.yaml
values:
  - ../values.yaml

tests:
  - it: should not render when service.enabled is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ClusterIP service
    set:
      appName: myapp
      service:
        enabled: true
        type: ClusterIP
        ports:
          http:
            externalPort: 8080
            internalPort: 8080
            protocol: TCP
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: myapp-sv
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080

  - it: should support multiple ports
    set:
      appName: myapp
      service:
        enabled: true
        ports:
          http:
            externalPort: 8080
            internalPort: 8080
            protocol: TCP
          grpc:
            externalPort: 9090
            internalPort: 9090
            protocol: TCP
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2
